# ──────────────────────────────────────────────
# PLUGINS
# ──────────────────────────────────────────────
plugins:
  - serverless-localstack

# ──────────────────────────────────────────────
# LOCALSTACK CONFIG
# ──────────────────────────────────────────────
custom:
  localstack:
    stages:
      - local                    # Only active when deploying with --stage local
    host: http://localhost        # LocalStack default host
    edgePort: 4566               # LocalStack unified edge port
    autostart: false             # Set true to auto-start LocalStack via Docker
    networks:
      - host
    lambda:
      mountCode: false            # Mount code directly for faster iteration (no re-deploy needed)
    docker:
      sudo: false
    deploy:
      createStage: true

# ──────────────────────────────────────────────
# PACKAGE  (default: exclude everything, include explicitly)
# ──────────────────────────────────────────────
package:
  individually: true   # Each function packages its own artifact
  excludeDevDependencies: true