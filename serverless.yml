# ──────────────────────────────────────────────
# RESOURCES (CloudFormation)
# ──────────────────────────────────────────────
resources:
  Resources:

    # ── S3 Bucket: Original Images ───────────────
    ImagesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${self:provider.stage}-images
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders:
                - "*"
              AllowedMethods:
                - GET
                - PUT
                - POST
              AllowedOrigins:
                - "*"
              MaxAge: 3000
        LifecycleConfiguration:
          Rules:
            - Id: ExpireOldImages
              Status: Enabled
              ExpirationInDays: 365   # Adjust or remove as needed
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true

