service: image-thumbnail-service

frameworkVersion: "4"

provider:
  name: aws
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  memorySize: 512  # Default for all lambdas (overridable per function)
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource:
            - !GetAtt ImagesBucket.Arn
            - !Sub "${ImagesBucket.Arn}/*"

  # API Gateway binary media types
  apiGateway:
    binaryMediaTypes:
      - "image/*"
      - "multipart/form-data"
      - "application/octet-stream"
      - "application/json"
  # Environment variables available to all functions
  environment:
    IMAGES_BUCKET: !Ref ImagesBucket
    # THUMBNAILS_BUCKET: !Ref ThumbnailsBucket
    STAGE: ${self:provider.stage}

# ──────────────────────────────────────────────
# FUNCTIONS
# ──────────────────────────────────────────────
functions:

  # ── Lambda 1: Java — Upload Image ──────────────
  uploadImage:
    runtime: java17
    memorySize: 512
    timeout: 29
    handler: org.example.ImageHandlerLegacy::handleRequest
    package:
      artifact: upload-handler-service/Serverless-Image-Handler/target/Serverless-Image-Handler-1.0-SNAPSHOT.jar   # Path to your built JAR
    description: "Accepts image uploads (binary) and stores them in the images bucket"
    events:
      - http:
          path: /images
          method: post
          cors: true
          # Required for API Gateway to pass binary payloads to Lambda
          # contentHandling: CONVERT_TO_BINARY

  get-presigned-url:
    runtime: java17
    memorySize: 512
    timeout: 29
    handler: org.example.ImageUrlGenerator::handleRequest
    package:
      artifact: upload-handler-service/Serverless-Image-Handler/target/Serverless-Image-Handler-1.0-SNAPSHOT.jar   # Path to your built JAR
    description: "Returns the presigned url."
  #   events:
    events:
      - http:
          path: /images/pre-signed
          method: get
          cors: true
      
  
      
